# =============================================================================
# Web Terminal — Docker Compose
# =============================================================================
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f
# Rebuild: docker compose up -d --build
# =============================================================================

services:
  web-terminal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-terminal
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - terminal-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  terminal-logs:
    driver: local
